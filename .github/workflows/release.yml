name: release

run-name: release ${{ inputs.extension || 'scheduled' }}

on:
  workflow_dispatch:
    inputs:
      extension:
        description: Extension to release
        required: true
        default: obsidian-clipper
        type: choice
        options:
          - obsidian-clipper
          - tabalanche
  schedule:
    - cron: "17 18 * * *"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  WEB_EXT_ARTIFACTS_DIR: web-ext-artifacts
  RELEASE_BASE_URL: https://github.com/sunlei/firefox-extensions-releases/releases/download
  UPDATE_BASE_URL: https://raw.githubusercontent.com/sunlei/firefox-extensions-releases/master
  UPSTREAMS_FILE: upstreams.json

jobs:
  select:
    name: Select extensions
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.select.outputs.has_changes }}
      matrix: ${{ steps.select.outputs.matrix }}
    steps:
      - name: Checkout repository `self`
        uses: actions/checkout@v6

      - name: Install jq if not already installed
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt update && sudo apt install -y jq
          fi

      - name: Select extensions to release
        id: select
        env:
          RELEASE_EXTENSION: ${{ inputs.extension }}
        run: |
          bash scripts/select-release-extensions.sh

  publish:
    name: Publish ${{ matrix.extension }}
    needs: select
    if: needs.select.outputs.has_changes == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.select.outputs.matrix) }}
    steps:
      - name: Checkout repository `self`
        uses: actions/checkout@v6

      - name: Configure extension
        env:
          RELEASE_EXTENSION: ${{ matrix.extension }}
        run: |
          bash scripts/configure-extension.sh

      - name: Checkout repository `${{ matrix.extension }}`
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.ref }}
          path: src

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install web-ext
        run: |
          pnpm install --global web-ext

      - name: Install jq if not already installed
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt update && sudo apt install -y jq
          fi

      - name: Install Obsidian Clipper dependencies
        if: matrix.extension == 'obsidian-clipper'
        working-directory: src
        run: |
          npm install --package-lock-only --no-audit --no-fund
          npm ci

      - name: Build Obsidian Clipper Firefox extension
        if: matrix.extension == 'obsidian-clipper'
        working-directory: src
        run: |
          npm run build:firefox

      - name: Set release version
        env:
          RELEASE_EXTENSION: ${{ matrix.extension }}
        run: |
          bash scripts/set-release-version.sh

      - name: Update manifest.json
        run: |
          bash scripts/update-manifest.sh

      - name: Build and sign extension
        run: |
          web-ext sign \
            --source-dir "$EXTENSION_SOURCE_DIR" \
            --channel unlisted \
            --api-key ${{ secrets.AMO_JWT_ISSUER }} \
            --api-secret ${{ secrets.AMO_JWT_SECRET }}
          ls -alh "$WEB_EXT_ARTIFACTS_DIR"

      - name: Rename signed extension
        run: |
          bash scripts/rename-xpi.sh
          ls -alh "$WEB_EXT_ARTIFACTS_DIR"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.WEB_EXT_ARTIFACTS_DIR }}/${{ env.ARTIFACT_NAME }}
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}

      - name: Sync release repository
        run: |
          git pull --ff-only origin master

      - name: Update extension update manifest
        run: |
          bash scripts/update-updates.sh

      - name: Update upstream state
        env:
          RELEASE_EXTENSION: ${{ matrix.extension }}
          UPSTREAM_SHA: ${{ matrix.upstream_sha }}
        run: |
          bash scripts/update-upstream-state.sh

      - name: Git commit release metadata
        run: |
          git config --local user.name "GitHub Action 🤖"
          git config --local user.email "actions@github.com"

          git add "$UPDATES_FILE" "$UPSTREAMS_FILE"
          git commit -m "feat: release ${{ matrix.extension }} v${{ env.RELEASE_VERSION }}"
          git push
